<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Transactions - State Bank of India</title>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <div class="logo-icon">SBI</div>
                    <div class="logo-text">
                        <h1>State Bank of India</h1>
                        <p>India's Trusted Bank Since 1806</p>
                    </div>
                </div>
                <nav id="mainNav">
                    <a href="admin.html">Dashboard</a>
                    <a href="admin-users.html">Users</a>
                    <a href="admin-transactions.html">Transactions</a>
                    <a href="admin-add-money.html">Add Money</a>
                    <a href="admin-deduct-money.html">Deduct Money</a>
                </nav>
                <form action="logout" method="post" style="margin:0;">
                    <button type="submit" class="btn-login">Logout</button>
                </form>
            </div>
        </div>
    </header>

    <div class="main-wrapper">
        <div class="container">
            <div class="transaction-section">
                <h3>All System Transactions</h3>
                <table class="transaction-table">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>From Account</th>
                            <th>To Account</th>
                            <th>Amount</th>
                            <th>Mode</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="transactionTableBody">
                        <tr>
                            <td colspan="6" style="text-align: center; color: var(--sbi-gray);">Loading transactions...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // Fetch data from Servlet on page load
        window.onload = function() {
            fetch('GetTransactions')
                .then(response => response.json())
                .then(data => {
                    const tbody = document.getElementById('transactionTableBody');
                    if (data.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="6" style="text-align: center;">No transactions found</td></tr>';
                        return;
                    }
                    // Map the JSON data to table rows
                    tbody.innerHTML = data.map(t => `
                        <tr>
                            <td>${t.date}</td>
                            <td>${t.fromAccount}</td>
                            <td>${t.toAccount}</td>
                            <td class="transaction-amount">₹${t.amount}</td>
                            <td>${t.mode}</td>
                            <td><span class="transaction-status status-${t.status.toLowerCase()}">${t.status}</span></td>
                        </tr>
                    `).join('');
                })
                .catch(error => {
                    console.error('Error:', error);
                    document.getElementById('transactionTableBody').innerHTML = '<tr><td colspan="6" style="text-align: center; color: red;">Failed to load transactions.</td></tr>';
                });
        };
    </script>
</body>
</html>
